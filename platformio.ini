; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 9600

; Позволит вам видеть, что именно вы печатаете или вставляете в монитор (по умолчанию ввод часто "слепой")
monitor_echo = yes
; включает режим "буферизации". Теперь, когда вы вставляете текст в терминал, он не улетает в Arduino мгновенно. 
; Вы можете отредактировать строку, и она отправится в контроллер только после того, как вы нажмете Enter
monitor_filters = send_on_enter
; Гарантирует, что при нажатии Enter будет отправлен именно символ \n (Line Feed)
monitor_eol = LF

; Добавляем SoftwareSerial в список зависимостей принудительно
lib_deps = adafruit/Adafruit Motor Shield library @ ^1.0.1